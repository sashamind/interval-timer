<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Same mark as icon.svg, shrunk into the maskable safe zone: launchers crop
       to a circle 80% of the icon, which would clip the stopwatch button. -->
  <rect width="512" height="512" fill="#0a0a0a"/>
  <g transform="translate(256, 264) scale(0.75) translate(-256, -248)">
    <circle cx="256" cy="286" r="150" fill="none" stroke="#ff3b1f" stroke-width="28"/>
    <rect x="228" y="60" width="56" height="44" rx="6" fill="#e8e4db"/>
    <rect x="240" y="96" width="32" height="40" fill="#e8e4db"/>
    <line x1="256" y1="286" x2="256" y2="196" stroke="#e8e4db" stroke-width="20" stroke-linecap="round"/>
    <line x1="256" y1="286" x2="322" y2="316" stroke="#f5c518" stroke-width="20" stroke-linecap="round"/>
    <circle cx="256" cy="286" r="16" fill="#e8e4db"/>
  </g>
</svg>
